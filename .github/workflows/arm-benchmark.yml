name: Arm64 Optimization & Quantization Benchmark

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the run

jobs:
  build-quantize-benchmark:
    runs-on: ubuntu-24.04-arm # Uses GitHub's native Arm64 cloud runner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip jq

      - name: Download Pre-built llama.cpp (Arm64 Native)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading latest pre-built llama.cpp for aarch64..."
          mkdir -p ./llama.cpp/build/bin/
          mkdir -p ./llama_bin/
          
          # Download the latest pre-built binary for ubuntu-aarch64
          gh release download -R ggerganov/llama.cpp --pattern "*ubuntu-aarch64.zip" --dir ./llama_bin
          
          # Unzip it into the expected directory
          unzip -j ./llama_bin/*ubuntu-aarch64.zip -d ./llama.cpp/build/bin/
          chmod +x ./llama.cpp/build/bin/*

      - name: Download Quantized Model Artifact (Avoid Re-Quantizing)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading Q5_K_M model from previous successful run (ID: 28031834372)..."
          gh run download 28031834372 -n Nanbeige-3B-Q5_K_M -D .
          ls -lh nanbeige-3b-q5_k_m.gguf

      - name: Run Benchmark Test (JSON Evaluation)
        run: |
          echo "Starting Model Benchmark on Arm64..."
          # Python script to load JSON and run the model automatically
          python3 -c '
          import json
          import subprocess

          with open("test_questions.json", "r") as f:
              questions = json.load(f)

          # Only run the first 5 questions to save CI execution time (approx 2-3 mins instead of 25+ mins)
          for i, q in enumerate(questions[:5]):
              print(f"\n=========================================")
              print(f"Question {i+1}/{len(questions[:5])}: {q}")
              print(f"=========================================")
              
              cmd = [
                  "./llama.cpp/build/bin/llama-cli",
                  "-m", "./nanbeige-3b-q5_k_m.gguf",
                  "-t", "4", "-b", "512", "-fa", "on", "-c", "2048",
                  "--log-disable", "-p", q
              ]
              
              # Run the model and feed "/exit" to stdin to break the interactive loop
              process = subprocess.Popen(cmd, stdin=subprocess.PIPE, text=True)
              process.communicate(input="/exit\n")
          '
