name: Arm64 Optimization & Quantization Benchmark

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-quantize-benchmark:
    runs-on: ubuntu-24.04-arm # Native Arm64 cloud runner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake jq

      - name: Build llama.cpp (Fast Native Compilation)
        run: |
          echo "Building llama.cpp from source (takes ~1 minute)..."
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build
          cmake --build build --config Release -j 4
          pip install -r requirements.txt

      - name: Download Quantized Model Artifact (Avoid Re-Quantizing)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading Q5_K_M model from previous successful run (ID: 28031834372)..."
          gh run download 28031834372 -n Nanbeige-3B-Q5_K_M -D .
          ls -lh nanbeige-3b-q5_k_m.gguf

      - name: Run Benchmark Test (JSON Evaluation)
        run: |
          echo "Starting Model Benchmark on Arm64..."
          python3 -c '
          import json
          import subprocess

          with open("test_questions.json", "r") as f:
              questions = json.load(f)

          # Only run the first 5 questions to save CI execution time
          for i, q in enumerate(questions[:5]):
              print(f"\n=========================================")
              print(f"Question {i+1}/{len(questions[:5])}: {q}")
              print(f"=========================================")
              
              cmd = [
                  "./llama.cpp/build/bin/llama-cli",
                  "-m", "./nanbeige-3b-q5_k_m.gguf",
                  "-t", "4", "-b", "512", "-fa", "on", "-c", "2048",
                  "--log-disable", "-p", q
              ]
              
              process = subprocess.Popen(cmd, stdin=subprocess.PIPE, text=True)
              process.communicate(input="/exit\n")
          '
